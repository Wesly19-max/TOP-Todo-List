<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
</head>
<body>
  <header>
    <h1>Todo List</h1>
  </header>
  <main>
    <div class="sidebar">
      <div class="headline">
        <h1>Home</h1>
        <hr>
        <div class="option">
          <img width="27" height="27" src="https://img.icons8.com/fluency/48/inbox.png" alt="inbox"/>
          <h3>All tasks</h3>
        </div>
        <div class="option">
          <img width="27" height="27" src="https://img.icons8.com/fluency/48/today.png" alt="today"/>
          <h3>Today</h3>
        </div>
        <div class="option">
          <img width="27" height="27" src="https://img.icons8.com/color/48/calendar-7.png" alt="calendar-7"/>
          <h3>Next 7 days</h3>
        </div>
        <div class="option">
          <img width="27" height="27" src="https://img.icons8.com/emoji/48/star-emoji.png" alt="star-emoji"/>
          <h3>Important</h3>
        </div>
      </div>
      <div class="headline projects">
        <h1>Projects</h1>
        <hr>
      </div>
    </div>
    <div class="main">
      <div class="project-name-card">
        <h1 class="project-name">Project name</h1>
      </div>
      <div class="taskContent">
        <div class="task">
          <div class="left-task-content">
            <img width="24" height="24" src="https://img.icons8.com/forma-thin-filled-sharp/24/unchecked-radio-button.png" alt="unchecked-radio-button"/>
            <p>task name</p>
          </div>
          <div class="right-task-content">
            <p class="due-date">no due date</p>
            <img width="24" height="24" src="https://img.icons8.com/ios/50/star--v1.png" alt="star--v1"/>
            <img width="24" height="24" src="https://img.icons8.com/ios-glyphs/30/menu-2.png" alt="menu-2"/>
          </div>
        </div>
        <div class="task">
          <div class="left-task-content">
            <img width="24" height="24" src="https://img.icons8.com/forma-thin-filled-sharp/24/unchecked-radio-button.png" alt="unchecked-radio-button"/>
            <p>task name</p>
          </div>
          <div class="right-task-content">
            <p class="due-date">no due date</p>
            <img width="24" height="24" src="https://img.icons8.com/ios/50/star--v1.png" alt="star--v1"/>
            <img width="24" height="24" src="https://img.icons8.com/ios-glyphs/30/menu-2.png" alt="menu-2"/>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer>
    Icons by Icons8 | 2026 © Wesly
  </footer>
</body>
</html>
